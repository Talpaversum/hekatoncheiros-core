apiVersion: apps/v1
kind: Deployment
metadata:
  name: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hekatoncheiros-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hekatoncheiros-core
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: core
          image: hekatoncheiros-core:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: hekatoncheiros-config
            - secretRef:
                name: hekatoncheiros-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/readyz
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: core-data
              mountPath: /var/lib/hekatoncheiros/core-data
      volumes:
        - name: core-data
          persistentVolumeClaim:
            claimName: core-data

