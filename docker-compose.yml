x-core-build: &core-build
  context: .
  dockerfile_inline: |
    FROM docker:27-cli AS docker-cli

    FROM node:22-bookworm-slim AS deps
    WORKDIR /app
    COPY package*.json ./
    RUN npm ci

    FROM deps AS build
    COPY tsconfig.json ./
    COPY schemas ./schemas
    COPY src ./src
    RUN npm run build

    FROM node:22-bookworm-slim AS runtime
    WORKDIR /app
    ENV NODE_ENV=production
    COPY --from=docker-cli /usr/local/bin/docker /usr/local/bin/docker
    COPY --from=docker-cli /usr/local/libexec/docker/cli-plugins /usr/local/libexec/docker/cli-plugins
    COPY package*.json ./
    RUN npm ci --omit=dev && npm cache clean --force
    COPY --from=build /app/dist ./dist
    COPY --from=build /app/src/db/migrations ./dist/src/db/migrations
    COPY --from=build /app/schemas ./schemas
    EXPOSE 3000
    CMD ["node", "dist/src/server.js"]

x-core-environment: &core-environment
  PORT: "3000"
  DATABASE_URL: ${DATABASE_URL:-postgres://hc_user:hc_password@postgres:5432/hc_core}
  CORE_DATA_DIR: /var/lib/hekatoncheiros/core-data
  TENANCY_MODE: ${TENANCY_MODE:-row_level}
  JWT_ISSUER: ${JWT_ISSUER:-hekatoncheiros-core}
  JWT_AUDIENCE_USER: ${JWT_AUDIENCE_USER:-hc-user}
  JWT_AUDIENCE_APP: ${JWT_AUDIENCE_APP:-hc-app}
  JWT_SECRET: ${JWT_SECRET:-dev-compose-jwt-secret-change-me}
  APP_DELEGATION_SIGNING_PRIVATE_JWK_JSON: ${APP_DELEGATION_SIGNING_PRIVATE_JWK_JSON:-{"crv":"Ed25519","d":"2zZRDOPRk5kGWJ77q4781dtzvZ6epsJfQpzvPHD7mwU","x":"yX9arOMjShM8hvqmwg7B1abzkyAQYyfYPieQaTIh5Lk","kty":"OKP","kid":"core-delegation-dev-1"}}
  INSTALLER_TOKEN_SECRET: ${INSTALLER_TOKEN_SECRET:-dev-compose-installer-secret-change-me}
  INSTALLER_TOKEN_ISSUER: ${INSTALLER_TOKEN_ISSUER:-hekatoncheiros-core-installer}
  DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-tnt_default}
  LICENSING_CLOCK_SKEW_SECONDS: ${LICENSING_CLOCK_SKEW_SECONDS:-600}
  LICENSING_CLOCK_SOFT_GRACE_SECONDS: ${LICENSING_CLOCK_SOFT_GRACE_SECONDS:-43200}
  OFFLINE_LICENSE_PUBLIC_KEYS_JSON: ${OFFLINE_LICENSE_PUBLIC_KEYS_JSON:-{}}
  LICENSING_ROOT_JWKS_JSON: ${LICENSING_ROOT_JWKS_JSON:-{"keys":[]}}
  LICENSING_DCR_SIGNING_PRIVATE_JWK_JSON: ${LICENSING_DCR_SIGNING_PRIVATE_JWK_JSON:-}
  LICENSING_DCR_SIGNING_PUBLIC_JWK_JSON: ${LICENSING_DCR_SIGNING_PUBLIC_JWK_JSON:-}
  LICENSING_OAUTH_CALLBACK_BASE_URL: ${LICENSING_OAUTH_CALLBACK_BASE_URL:-http://localhost:8080}
  AUTHOR_REGISTRY_URL: ${AUTHOR_REGISTRY_URL:-}
  AUTHOR_REGISTRY_ALLOW_HTTP: ${AUTHOR_REGISTRY_ALLOW_HTTP:-false}
  AUTHOR_REGISTRY_ADMIN_TOKEN: ${AUTHOR_REGISTRY_ADMIN_TOKEN:-}
  AUTHOR_REGISTRY_APP_ID: ${AUTHOR_REGISTRY_APP_ID:-hekatoncheiros/author-registry}
  AUTHOR_GIT_TOKEN_ENCRYPTION_KEY: ${AUTHOR_GIT_TOKEN_ENCRYPTION_KEY:-}
  AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-365}
  AUDIT_RETENTION_BATCH_SIZE: ${AUDIT_RETENTION_BATCH_SIZE:-1000}

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PUBLISHED_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hc_password}
      POSTGRES_DB: ${POSTGRES_DB:-hc_core}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20

  core:
    build: *core-build
    image: hekatoncheiros-core:local
    environment: *core-environment
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - core_data:/var/lib/hekatoncheiros/core-data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/v1/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "${CORE_PUBLISHED_PORT:-3000}:3000"

  core-seed:
    build: *core-build
    image: hekatoncheiros-core:local
    profiles: ["seed"]
    command: ["node", "dist/src/db/seed.js"]
    environment: *core-environment
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../hekatoncheiros-web
      args:
        VITE_API_BASE: ${VITE_API_BASE:-/api/v1}
      dockerfile_inline: |
        FROM node:22-bookworm-slim AS build
        WORKDIR /app
        COPY package*.json ./
        RUN npm ci
        COPY index.html postcss.config.js tailwind.config.js tsconfig.json tsconfig.app.json tsconfig.node.json vite.config.ts ./
        COPY public ./public
        COPY src ./src
        ARG VITE_API_BASE=/api/v1
        ENV VITE_API_BASE=$$VITE_API_BASE
        RUN npm run build

        FROM nginx:1.27-alpine
        COPY --from=build /app/dist /usr/share/nginx/html
        RUN printf '%s\n' \
          'server {' \
          '  listen 80;' \
          '  server_name _;' \
          '  root /usr/share/nginx/html;' \
          '  index index.html;' \
          '' \
          '  location /api/v1/ {' \
          '    proxy_pass http://core:3000;' \
          '    proxy_http_version 1.1;' \
          '    proxy_set_header Host $$host;' \
          '    proxy_set_header X-Real-IP $$remote_addr;' \
          '    proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;' \
          '    proxy_set_header X-Forwarded-Proto $$scheme;' \
          '  }' \
          '' \
          '  location /docs {' \
          '    proxy_pass http://core:3000;' \
          '    proxy_http_version 1.1;' \
          '    proxy_set_header Host $$host;' \
          '    proxy_set_header X-Real-IP $$remote_addr;' \
          '    proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;' \
          '    proxy_set_header X-Forwarded-Proto $$scheme;' \
          '  }' \
          '' \
          '  location = /.well-known/hc/app-catalog.json {' \
          '    proxy_pass http://core:3000;' \
          '    proxy_http_version 1.1;' \
          '    proxy_set_header Host $$host;' \
          '    proxy_set_header X-Real-IP $$remote_addr;' \
          '    proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;' \
          '    proxy_set_header X-Forwarded-Proto $$scheme;' \
          '  }' \
          '' \
          '  location / {' \
          '    try_files $$uri $$uri/ /index.html;' \
          '  }' \
          '}' \
          > /etc/nginx/conf.d/default.conf
    image: hekatoncheiros-web:local
    depends_on:
      core:
        condition: service_healthy
    ports:
      - "${WEB_PUBLISHED_PORT:-8080}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
  core_data:
